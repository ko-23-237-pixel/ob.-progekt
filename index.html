<script>
  // === Настройка Supabase (замени на свои ключи) ===
  const supabaseUrl = 'https://твой-проект.supabase.co';
  const supabaseAnonKey = '82b0a22d-2370-4695-bd3d-53ac0840fbcc';

  const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

  // ID текущего пользователя (можно получить через supabase.auth.getUser())
  let MY_ID = null;

  // Функция загрузки всех пользователей для "Монитор группы"
  async function fetchGroup() {
    const { data, error } = await supabase
      .from('profiles')
      .выбирать('*')
      .заказ('имя пользователя', { восходящий: истинный });

    если (ошибка) {
      консоль.ошибка('Ошибка при загрузке группы:', ошибка);
      возвращаться;
    }

    константа список = документ.getElementById('групповой список');
    если (!список) возвращаться;

    список.внутреннийHTML = данные.карта(пользователь => `
      <div class="flex items-center gap-3 py-2">
        <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
        <div>
          <p class="font-medium">${пользователь.имя пользователя}</p>
          <p class="text-gray-500 text-sm">${пользователь.статус || 'Статус не задан'}</p>
        </div>
      </div>
    `).присоединиться('');
  }

  // Функция загрузки информации о текущем пользователе
  асинхронный функция fetchMyInfo() {
    константа { данные: { пользователь } } = ждать супабаза.аутентификация.getUser();
    если (!пользователь) {
      консоль.бревно('Пользователь не авторизован');
      возвращаться;
    }

    МОЙ_ID = пользователь.идентификатор;

    константа { данные: мне, ошибка } = ждать супабаза
      .от('профили')
      .выбирать('*')
      .экв('ид', пользователь.идентификатор)
      .одинокий();

    если (ошибка || !мне) {
      консоль.ошибка('Ошибка при загрузке своего профиля:', ошибка);
      возвращаться;
    }

    константа myInfoEl = документ.getElementById('мояИнформация');
    если (myInfoEl) {
      myInfoEl.внутреннийТекст = `Вы зашли как: ${мне.имя пользователя || 'Пользователь'}`;
    }
  }

  // Запуск всего при загрузке страницы
  асинхронный функция инициализировать() {
    ждать fetchMyInfo();
    ждать fetchGroup();

    // Обновляем список группы каждые 5 секунд
    установитьИнтервал(fetchGroup, 5000);
  }

  // Запускаем
  окно.нагружать = инициализировать;
</сценарий>
