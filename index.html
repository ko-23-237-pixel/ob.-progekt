<script>
  // === Настройка Supabase (замени на свои ключи) ===
  const supabaseUrl = 'https://твой-проект.supabase.co';
  const supabaseAnonKey = 'sb_publishable_dJEWPhHoUQjzcgBT3Q6YBQ_skil4W3Z';

  const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

  // ID текущего пользователя (можно получить через supabase.auth.getUser())
  let MY_ID = null;

  // Функция загрузки всех пользователей для "Монитор группы"
  async function fetchGroup() {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .order('username', { ascending: true });

    if (error) {
      console.error('Ошибка при загрузке группы:', error);
      return;
    }

    const list = document.getElementById('grouplist');
    if (!list) return;

    list.innerHTML = data.map(user => `
      <div class="flex items-center gap-3 py-2">
        <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
        <div>
          <p class="font-medium">${user.username}</p>
          <p class="text-gray-500 text-sm">${user.status || 'Статус не задан'}</p>
        </div>
      </div>
    `).join('');
  }

  // Функция загрузки информации о текущем пользователе
  async function fetchMyInfo() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      console.log('Пользователь не авторизован');
      return;
    }

    MY_ID = user.id;

    const { data: me, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (error || !me) {
      console.error('Ошибка при загрузке своего профиля:', error);
      return;
    }

    const myInfoEl = document.getElementById('myInfo');
    if (myInfoEl) {
      myInfoEl.innerText = `Вы зашли как: ${me.username || 'Пользователь'}`;
    }
  }

  // Запуск всего при загрузке страницы
  async function init() {
    await fetchMyInfo();
    await fetchGroup();

    // Обновляем список группы каждые 5 секунд
    setInterval(fetchGroup, 5000);
  }

  // Запускаем
  window.onload = init;
</script>
