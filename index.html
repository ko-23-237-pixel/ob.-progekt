<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой профиль - Supabase</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f8fafc; }
    .status-btn {
      transition: all 0.2s ease;
    }
    .status-btn.active {
      ring: 4px;
      ring-offset: 2px;
      box-shadow: 0 0 0 4px rgb(59 130 246 / 0.3);
    }
  </style>
</head>

<body class="min-h-screen py-8">
  <div class="max-w-md mx-auto px-4 space-y-6">

    <!-- Кнопка входа -->
    <button onclick="signInWithGoogle()"
      class="w-full bg-red-500 text-white py-3 rounded-xl">
      Войти через Google
    </button>

    <!-- Профиль -->
    <div class="bg-white rounded-3xl shadow-lg p-6">
      <h2 class="text-2xl font-semibold mb-1">Мой профиль</h2>
      <p id="myInfo" class="text-gray-600 mb-6">Дарья</p>

      <div class="grid grid-cols-2 gap-3">
        <button onclick="updateStatus(this, 'Учусь')" class="status-btn bg-green-500 text-white py-4 rounded-2xl">📚 Учусь</button>
        <button onclick="updateStatus(this, 'Кофе')" class="status-btn bg-yellow-500 text-white py-4 rounded-2xl">☕ Кофе</button>
        <button onclick="updateStatus(this, 'В игре')" class="status-btn bg-blue-500 text-white py-4 rounded-2xl">🎮 В игре</button>
        <button onclick="updateStatus(this, 'Дома')" class="status-btn bg-gray-500 text-white py-4 rounded-2xl">🏠 Дома</button>
      </div>
    </div>

    <!-- Группа -->
    <div class="bg-white rounded-3xl shadow-lg p-6">
      <h3 class="text-xl font-semibold mb-4">Монитор группы</h3>
      <div id="grouplist"></div>
    </div>

  </div>

<script>
  // 🔑 ВСТАВЬ СВОИ ДАННЫЕ
  const supabaseUrl = 'https://jgdqtpbmdcdhcoucrmzs.supabase.co/auth/v1/callback';
  const supabaseAnonKey = 'sb_publishable_dJEWPhHoUQjzcgBT3Q6YBQ_skil4W3Z';

  const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

  let currentUserId = null;

  // ===== GOOGLE LOGIN =====
  async function signInWithGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin
      }
    });

    if (error) console.error(error);
  }

  // ===== СТАТУС =====
  async function updateStatus(btn, newStatus) {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (!currentUserId) return;

    const { error } = await supabase
      .from('profiles')
      .update({
        status: newStatus,
        updated_at: new Date().toISOString()
      })
      .eq('id', currentUserId);

    if (error) console.error(error);
  }

  // ===== МОЙ ПРОФИЛЬ =====
  async function fetchMyInfo() {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
      document.getElementById('myInfo').innerText = 'Вы не авторизованы';
      return;
    }

    currentUserId = user.id;

    const { data } = await supabase
      .from('profiles')
      .select('username')
      .eq('id', user.id)
      .single();

    document.getElementById('myInfo').innerText =
      `Вы зашли как: ${data?.username || 'Пользователь'}`;
  }

  // ===== ГРУППА =====
  async function fetchGroup() {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .order('username');

    if (error) {
      console.error(error);
      return;
    }

    document.getElementById('grouplist').innerHTML = data.map(user => `
      <div class="flex gap-3 py-2">
        <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
        <div>
          <p>${user.username || 'Без имени'}</p>
          <p class="text-sm text-gray-500">${user.status || 'Нет статуса'}</p>
        </div>
      </div>
    `).join('');
  }

  // ===== INIT =====
  async function init() {
    await fetchMyInfo();
    await fetchGroup();
    setInterval(fetchGroup, 5000);
  }

  window.onload = init;
</script>

</body>
</html>
